      :root {
        background:

        font-family: Arial, sans-serif;
        color: #415166;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
      }

      .stage {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      .floater {
        position: absolute;
        top: 18vh;
        left: 12vw;
        width: min(38vw, 340px);
        max-width: 80vw;
        aspect-ratio: 1 / 1;
        object-fit: cover;
        padding: 12px;
        border-radius: 34px;
        background: linear-gradient(145deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.58));
        border: 1px solid rgba(255, 255, 255, 0.85);
        box-shadow:
          0 30px 40px rgba(44, 67, 97, 0.18),
          0 0 0 10px rgba(255, 255, 255, 0.24),
          0 0 80px rgba(122, 175, 255, 0.2);
        clip-path: inset(0 round 34px);
        will-change: transform;
        pointer-events: none;
        user-select: none;
      }

      .caption,
      .sound-hint {
        position: absolute;
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid rgba(255, 255, 255, 0.92);
        box-shadow: 0 16px 35px rgba(70, 88, 113, 0.12);
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        backdrop-filter: blur(10px);
      }

      .caption {
        right: 20px;
        bottom: 18px;
      }

      .sound-hint {
        top: 18px;
        left: 20px;
        cursor: pointer;
        transition: opacity 180ms ease, transform 180ms ease;
        color: inherit;
      }

      .sound-hint.is-hidden {
        opacity: 0;
        transform: translateY(-8px);
        pointer-events: none;
      }

      .sound-hint.is-ready {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 720px) {
        .floater {
          width: min(64vw, 310px);
        }

        .caption,
        .sound-hint {
          font-size: 11px;
        }

        .sound-hint {
          left: 12px;
          top: 12px;
        }

        .caption {
          right: 12px;
          bottom: 12px;
        }
      }
    </style>

      const boinkPool = Array.from({ length: 6 }, () => new Audio(boinkDataUri));
      let boinkIndex = 0;

      function setHintLabel(text) {
        hint.textContent = text;
      }

      async function unlockAudio() {
        try {
          const warmup = boinkPool[0];
          warmup.volume = 0;
          warmup.currentTime = 0;
          await warmup.play();
          warmup.pause();
          warmup.currentTime = 0;
          warmup.volume = 1;
          audioUnlocked = true;
        } catch (error) {
          setHintLabel("Trykk igjen for lyd");
          return;
        }

        if (audioUnlocked) {
          setHintLabel("Boink pa");
          hint.classList.add("is-ready");
          playBoink(1.25);
          window.setTimeout(() => {
            hint.classList.add("is-hidden");
          }, 900);
        } else {
          setHintLabel("Trykk igjen for lyd");
        }
      }

      function playBoink(volumeBoost) {
        if (!audioUnlocked) {
          return;
        }

        const audio = boinkPool[boinkIndex];
        boinkIndex = (boinkIndex + 1) % boinkPool.length;
        audio.pause();
        audio.currentTime = 0;
        audio.volume = Math.min(1, 0.9 * (volumeBoost || 1));
        audio.play().catch(() => {
          audioUnlocked = false;
          hint.classList.remove("is-hidden");
          setHintLabel("Klikk for boink");
        });
      }

      function clampPosition() {
        const maxX = Math.max(window.innerWidth - floater.offsetWidth, 0);
        const maxY = Math.max(window.innerHeight - floater.offsetHeight, 0);
        x = Math.min(Math.max(0, x), maxX);
        y = Math.min(Math.max(0, y), maxY);
      }

      function animate() {
        const maxX = Math.max(window.innerWidth - floater.offsetWidth, 0);
        const maxY = Math.max(window.innerHeight - floater.offsetHeight, 0);
        const now = performance.now();
        let impacted = false;

        x += velocityX;
        y += velocityY;
        rotation += rotationVelocity;

        if (x <= 0 || x >= maxX) {
          x = Math.min(Math.max(0, x), maxX);
          velocityX *= -1;
          rotationVelocity *= -1;
          impacted = true;
        }

        if (y <= 0 || y >= maxY) {
          y = Math.min(Math.max(0, y), maxY);
          velocityY *= -1;
          rotationVelocity *= -1;
          impacted = true;
        }

        if (rotation > 12 || rotation < -12) {
          rotationVelocity *= -1;
        }

        floater.style.transform = "translate(" + x + "px, " + y + "px) rotate(" + rotation + "deg)";

        if (impacted && now - lastImpactAt > 70) {
          lastImpactAt = now;
          playBoink();
        }

        window.requestAnimationFrame(animate);
      }

      hint.addEventListener("click", unlockAudio);
      window.addEventListener("pointerdown", unlockAudio);
      window.addEventListener("keydown", unlockAudio);
      window.addEventListener("touchstart", unlockAudio, { passive: true });
      window.addEventListener("resize", clampPosition);

      clampPosition();
      floater.style.top = "0";
      floater.style.left = "0";
      floater.style.transform = "translate(" + x + "px, " + y + "px) rotate(" + rotation + "deg)";
      window.requestAnimationFrame(animate);
    </script>
